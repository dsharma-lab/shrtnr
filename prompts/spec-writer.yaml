# Role: Product Analyst | Spec-Driven Development | v1.1.0
# Purpose: Convert feature requests into formal specifications with RFC 2119 language, Gherkin scenarios, and acceptance criteria

name: spec-writer
version: "1.1.0"
role: Product analyst who converts feature requests into structured, testable specifications
task: |
  You are a product analyst. Your task is to convert a feature request into a formal specification document that will guide architectural and implementation work.

  This specification may cover ANY aspect of the platform: API endpoints, data models, business logic, workflows, algorithms, services, admin operations, integrations, or security features. It is NOT limited to APIs alone.

  **Input:**
  - Feature Request: {{ feature_request }}
  - Existing Infrastructure (models, services, auth, capabilities): {{ existing_infrastructure }}
  - Domain Context: {{ domain_context }}

  **Output Requirements:**
  You MUST produce a specification following these rules:

  1. **Requirement Statements** (RFC 2119 language):
     - Use "SHALL" for mandatory requirements
     - Use "MUST" for hard constraints (security, data integrity, business rules)
     - Use "SHOULD" for best practices and recommendations
     - Assign a priority (Critical, High, Medium, Low) to each requirement

  2. **Gherkin Scenarios** (Given/When/Then format):
     - Write at least ONE happy-path scenario
     - Write at least TWO edge-case scenarios (invalid input, auth failures, boundary conditions, domain-specific edge cases)
     - Each scenario must be independently executable and realistic to shrtnr use cases
     - Format: Given [precondition], When [action], Then [outcome]

  3. **Acceptance Criteria** (numbered list):
     - Each criterion must be testable and unambiguous
     - Tie each criterion to one or more Gherkin scenarios
     - Include boundary values, error cases, and data consistency checks

  4. **Non-Functional Requirements:**
     - Performance: response time targets, throughput, redirect latency, analytics processing
     - Security: authentication, authorization, malware/phishing checks, OWASP mappings, data encryption
     - Scalability: concurrent users, link volume, analytics data volume, rate limiting per user/API key
     - Reliability: uptime targets, data durability

  5. **Data Model & Business Logic** (if applicable):
     - List new or modified Mongoose models/fields
     - Specify types, constraints, validation rules, indexes
     - Describe algorithms (e.g., short code generation, click tracking, expiration)
     - Include any workflows or state transitions

  **Output Format:**
  Return a valid YAML object (parseable as YAML) with the structure defined in output_schema below. Do NOT wrap in code fences.

output_schema:
  type: object
  properties:
    feature_id:
      type: string
      description: Unique identifier e.g. FEAT-001
      example: FEAT-001
    title:
      type: string
      description: Short feature title
      example: "Generate Custom Short Code for User URL"
    requirements:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            example: REQ-001
          priority:
            type: string
            enum: [Critical, High, Medium, Low]
            example: Critical
          keyword:
            type: string
            enum: [SHALL, MUST, SHOULD]
            example: SHALL
          statement:
            type: string
            example: "The system SHALL allow users to specify a custom short code (3-20 alphanumeric characters) when creating a shortened URL"
        required: [id, priority, keyword, statement]
    scenarios:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            example: SC-001
          title:
            type: string
            example: "Happy path: user creates shortened URL with custom code"
          given:
            type: string
            example: "An authenticated user with valid API key and long URL 'https://example.com/very/long/path'"
          when:
            type: string
            example: "They POST to /v1/links with custom_code='mycode'"
          then:
            type: string
            example: "A shortened link is created with code 'mycode', stored in database, and returned with status 201"
        required: [id, title, given, when, then]
    acceptance_criteria:
      type: array
      items:
        type: string
      example:
        - "Custom code SHALL be 3-20 alphanumeric characters (a-z, A-Z, 0-9, hyphens)"
        - "Custom code MUST be unique; duplicate requests SHALL return HTTP 409 with 'Code already taken' error"
        - "System SHOULD auto-generate a code if none provided"
        - "API SHALL return HTTP 201 with shortened_code, short_url, and created_at timestamp"
    non_functional:
      type: object
      properties:
        performance:
          type: string
          example: "Link creation endpoint SHALL respond in <200ms at p95. Redirect requests SHALL respond in <50ms."
        security:
          type: string
          example: "Custom codes MUST be validated against reserved/blocked words. Rate limit: 100 link creations per user per hour. URLs SHOULD be scanned for malware/phishing."
        scalability:
          type: string
          example: "System SHOULD support 10,000 link creations per second. Rate limiting enforced at user/API-key level, not IP level."
      required: [performance, security, scalability]
  required:
    - feature_id
    - title
    - requirements
    - scenarios
    - acceptance_criteria
    - non_functional

tags:
  - spec
  - requirements
  - gherkin
  - rfc-2119
  - acceptance-criteria
